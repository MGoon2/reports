<script type="text/plain" id="markdown-source"># 1. 시스템 요약

- 분석 대상: `FinUp.CollectData.App.AlphaBot`, `FinUp.Finance.App.AlphaBot`, `FinUp.Radar.App.AlphaBot`, `FinUp.Stock.App.AlphaBot`.
- 앱 유형: 4개 모두 WPF `WinExe` 계열이다. `Program.cs`는 4개 프로젝트에서 발견되지 않았고, `App.xaml`의 `StartupUri=&quot;MainWindow.xaml&quot;`로 시작한다.
- 공통 동작: `T_Operation` + `T_OperationTerm`을 주기적으로 조회해 `OperationType` 조건을 계산하고, 매핑된 업무 메서드를 별도 `Thread`에서 실행한다.
- 주요 DB: `SystemData.dbo.T_Operation`, `SystemData.dbo.T_OperationTerm`, `SystemData.dbo.USP_Operation_Update`, `SystemData.dbo.USP_OperationTermHistory_Insert`. 업무별로 `StockData`, `ThemeRadar`, `DbStockPoint`, MongoDB, Redis, MySQL성 설정이 추가로 사용된다.
- 운영상 핵심 위험: DB 기반 전역 선점/락 없이 프로세스 메모리의 `member.actionState`만으로 중복 실행을 막는다. 같은 앱이 2개 이상 실행되면 같은 `OIdx/OTIdx`가 중복 처리될 수 있다. 위험도: **Critical**.
- 확인된 활성 작업 규모(DB 스냅샷 기준): Data 7개, Finance 2개, ThemeRadar 19개, StockPoint 53개 활성 작업. 근거: `/mnt/c/04_업무/T_Operation.md`.
- 안전 개선 방향 요약: (1) 코드 변경 전 운영 인스턴스 수 확인, (2) `OIdx/OTIdx` 단위 DB lease/lock 설계, (3) `MaxDuration` 기반 복구 규칙 확인, (4) 실패 상태/재시도 정책 표준화, (5) 설정의 비밀값 분리 및 회전.

# 2. 실행 진입점 분석

| 항목 | 내용 | 근거 파일/메서드 |
|---|---|---|
| Program.cs / Main | 4개 대상 프로젝트에서 `Program.cs` 없음. WPF 빌드가 생성하는 엔트리포인트에 의존하는 구조로 판단된다. | `find ... -name Program.cs` 결과 없음, `FinUp.*.csproj`의 `OutputType=WinExe` |
| CollectData 앱 유형 | SDK 스타일 WPF `WinExe`, `.NET 6 Windows`, `UseWPF=true`. `App.xaml`이 `MainWindow.xaml`을 시작한다. | `FinUp.CollectData.App.AlphaBot/...csproj:5-7`, `App.xaml:1-5` |
| Finance 앱 유형 | SDK 스타일 WPF `WinExe`, `.NET 6 Windows`, `UseWPF=true`. `App.xaml`이 `MainWindow.xaml`을 시작한다. | `FinUp.Finance.App.AlphaBot/...csproj:4-6`, `App.xaml:1-5` |
| Radar 앱 유형 | .NET Framework WPF `WinExe`, `TargetFrameworkVersion v4.7`, `App.xaml` → `MainWindow.xaml`. | `FinUp.Radar.App.AlphaBot.csproj:8-12`, `App.xaml:1-5` |
| Stock 앱 유형 | .NET Framework WPF `WinExe`, `TargetFrameworkVersion v4.7`, `App.xaml` → `MainWindow.xaml`. | `FinUp.Stock.App.AlphaBot.csproj:8-12`, `App.xaml:1-5` |
| CollectData 초기화 | XAML에서 `MainViewModel`을 `DataContext`로 생성한다. 생성자에서 `_biz = new AlphaBotBiz()`, `GetOperationModel()`로 `SvcType=&#x27;Data&#x27;` 작업을 로딩하고 `tObserveTimer`만 시작한다. 메인 처리 타이머는 시작 버튼/명령이 실행해야 시작된다. | `MainWindow.xaml:10-12`, `ViewModel/MainViewModel.cs:27-62`, `CommandStart_Click:135-139` |
| Finance 초기화 | XAML에서 `MainViewModel`을 생성한다. 생성자에서 `GetOperationModel()`로 `SvcType=&#x27;Finance&#x27;` 작업을 로딩하고 `tObserveTimer`만 시작한다. 메인 처리 타이머는 시작 명령이 필요하다. | `MainWindow.xaml:10-12`, `ViewModel/MainViewModel.cs:26-61`, `CommandStart_Click:134-138` |
| Radar 초기화 | `MainWindow.Loaded`에서 `InitializeMember()` 후 live 설정이 `REAL`이면 `btnStart_Click()`을 자동 호출한다. | `MainWindow.xaml.cs:86-100`, live config `Server=REAL` `/mnt/c/App/Config/alphabots/FinUp.Radar.App.AlphaBot.exe.config:47` |
| Stock 초기화 | `MainWindow.Loaded`에서 `InitializeMember()`만 호출한다. 자동 `btnStart_Click()` 호출은 확인되지 않았다. | `MainWindow.xaml.cs:60-68` |
| 종료 처리 | Radar는 `OnExit`에서 `Application.Current.Shutdown()`만 수행한다. Stock은 `OnExit`에서 `Thread.Sleep(1000)` 후 종료한다. 실행 중 작업 스레드에 대한 취소 토큰/Join/정리 루틴은 근거 없음. | `FinUp.Radar.App.AlphaBot/App.xaml.cs:56-60`, `FinUp.Stock.App.AlphaBot/App.xaml.cs:50-57` |

# 3. 루프 구조 분석

| 위치 | 방식 | 주기 | DB 호출 여부 | 중복 실행 가능성 | 예외 처리 | 위험도 |
|---|---|---:|---|---|---|---|
| CollectData `MainViewModel` | `DispatcherTimer tMainTimer` → `ProcessConfirm` → `StartConfirmProcess` → `new Thread(ProcessStart)` → 내부에서 다시 `new Thread(RunTask)` | live 설정 `AlphaBot.ObServeTime=5`, 코드도 설정값 사용 | 매 tick `ListOperationTerm(&quot;Data&quot;)`, 실행 전 `USP_Operation_Update`, 실행 이력 `USP_OperationTermHistory_Insert` | 단일 프로세스 내 `actionState` 확인은 있으나 DB 선점 없음. 다중 인스턴스/재시작 시 중복 가능 | 다수 `catch {}` 또는 빈 catch. `RunTask` 일부만 NLog | **Critical** |
| Finance `MainViewModel` | `DispatcherTimer tMainTimer` → `ProcessConfirm` → `StartConfirmProcess` → `new Thread(ProcessStart)` → 내부에서 다시 `new Thread(RunTask)` | 코드상 5초 고정, live config도 `AlphaBot.ObServeTime=5`이나 코드에서 설정값 사용 근거 없음 | 매 tick `ListOperationTerm(&quot;Finance&quot;)`, 실행 전 `USP_Operation_Update`, 실행 이력 Insert | DB 선점 없음. `LastExecDT`를 실행 전에 갱신하므로 실패/종료 시 Once 작업 유실 가능 | 초기화/업데이트/스케줄링에서 빈 catch 다수 | **High** |
| Radar `MainWindow` | `DispatcherTimer tMainTimer`; REAL이면 자동 시작. 작업은 `new Thread(ProcessStart)`로 분리 | 5초 (`const int iObserveTime=5`) | 매 tick `ListOperationTerm()`, 실행 전 `USP_Operation_Update`, 이력 Insert | `actionState`는 프로세스 메모리 한정. 다중 인스턴스 중복 가능 | 스케줄링 예외는 UI 로그, 일부 `catch {}`와 Trace | **Critical** |
| Stock `MainWindow` | `DispatcherTimer tMainTimer`, `tObserveTimer`, `tAlphaBotTimer`; 작업은 `new Thread(ProcessStart)` | 메인 5초, 관찰 1초, Alive 60초 | 매 tick `ListOperationTerm()`, `ProcessStart`에서 `USP_Operation_Update`, 이력 Insert | `actionState` 메모리 한정. 수동 실행과 다중 인스턴스 경합 가능 | `ProcessStart`는 ERROR/END 이력 기록. 일부 하위 코드에서 빈 catch/throw ex 존재 | **Critical** |
| CollectData 크롤링 발송 | `Task.Run(async () =&gt; await SendMessageList(...))`를 여러 곳에서 fire-and-forget로 호출 | 상위 작업 주기에 따름 | MongoDB/Kafka/Telegram 사용 | `Task.Run`을 await하지 않아 실행 이력 STOP이 외부 발송 완료보다 먼저 기록될 수 있음 | SendMessageAsync 예외는 throw하나 fire-and-forget 작업 예외는 상위 RunTask가 직접 관찰하지 못할 수 있음 | **High** |
| Stock 추천종목 수동 비교 | 업무 내부 `Thread.Sleep(nProcessSleep)` 후 재조회 | `nProcessSleep` 값 출처 추가 확인 필요 | Sleep 전후 DB 조회 | 실행 스레드 장기 점유. Stop 버튼/앱 종료 시 취소 불가 | 건별 catch는 콘솔 출력, 외부로 상태 DB 기록 근거 부족 | **Medium** |
| CollectData `KoreaBriefing` | `while(true)`로 직전 평일 탐색 | 조건 충족 시 break | MongoDB 조회 | 날짜 계산 루프는 break 조건이 있으나 보호 카운터 없음 | catch에서 기존 리스트 반환 | **Low** |

# 4. DB 폴링 흐름

| 순서 | 쿼리/테이블/SP | 코드 위치 | 처리 의미 | 위험 |
|---:|---|---|---|---|
| 1 | `SystemData.dbo.T_Operation` + `T_OperationTerm`, `SvcType=@SvcType`, `DisplayAlphabot=1`, `DelDT IS NULL`, `WITH(NOLOCK)` | CollectData `FinUp.Core.DS.Dac/.../SqlOperationDac.cs:15-49` | Data 서비스 작업/스케줄 조회 | `WITH(NOLOCK)`으로 더티리드 가능. MaxDuration을 조회하지 않아 장기 실행/복구 판단에 사용되지 않음. **High** |
| 2 | 같은 구조, `SvcType=&#x27;Finance&#x27;` 파라미터 | Finance `SqlOperationDao.cs:19-53` | Finance 작업/스케줄 조회 | 조회 건수 제한 없음. 활성 작업이 적어 현재 부하는 낮지만 구조상 전량 조회. **Medium** |
| 3 | 같은 구조, `SvcType=&#x27;ThemeRadar&#x27;` 고정 | Radar `FinUp.Radar/Sql/SqlOperation.cs:11-47` | ThemeRadar 작업/스케줄 조회 | 5초마다 전체 스케줄 재조회. `WITH(NOLOCK)`. **Medium** |

# 7. 중복 처리 위험

| 시나리오 | 원인 | 영향 | 방지 방법 |
|---|---|---|---|
| 같은 AlphaBot을 두 서버/프로세스에서 실행 | DB 선점 없이 프로세스 메모리 `actionState`만 확인 | SMS/Push/결제/포인트/뉴스 발송 중복. **Critical** | `OIdx/OTIdx`별 DB lease 테이블 또는 `sp_getapplock`, owner/expire 기반 선점 |
| Once 작업이 실행 전 `LastExecDT`만 갱신되고 앱 종료 | CollectData/Finance/Radar는 thread 시작 전 `USP_Operation_Update` 호출 | 실제 미처리인데 당일 실행 완료처럼 판단될 수 있음. **High** | START 이력과 END 이력 기준 복구, LastExecDT는 성공 후 또는 lease 상태와 분리 |
| 외부 발송 Task를 await하지 않음 | CollectData `Task.Run(async...)` fire-and-forget | Telegram/Kafka 실패가 상위 STOP 이력과 분리되어 누락/중복 재발송 가능. **High** | 외부 발송 완료를 기다리고 결과별 이력/중복키 기록 |
| 메모리 캐시 기반 URL 중복 방지 | `CrawlerSiteUrl.Instance`는 코드상 프로세스 메모리로 보임 | 앱 재시작 시 같은 뉴스 재발송 가능 | DB/Mongo에 URL+채널 unique key 또는 발송 이력 TTL 저장 |
| ManualExec와 자동 실행 경합 | DB `ManualExec=1`이고 `actionState==Stop`이면 즉시 실행 | 타이머 조건과 수동 실행이 가까울 때 중복 가능 | 수동 실행도 동일 DB lease 사용, ManualExec 처리 후 원자적 reset 확인 |
| MaxDuration 미사용 | 스냅샷에는 `MaxDuration`이 있으나 주요 ListOperationTerm SQL에서 선택하지 않음 | 장기 실행 감지/강제 복구가 앱 레벨에서 동작하지 않음 | `MaxDuration` 조회/이력과 연계한 stuck 작업 경보/복구 설계 |

  const head = headers.map((cell) => `<th>${inline(cell)}</th>`).join("");
  const body = bodyRows.map((row) => {
    const cells = row.map((cell) => `<td>${inline(cell)}</td>`).join("");
    return `<tr>${cells}</tr>`;
  }).join("");

  return {
    html: `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`,
    next: index
  };
}

function parseList(lines, start, ordered) {
  const tag = ordered ? "ol" : "ul";
  const items = [];
  let index = start;
  const pattern = ordered ? /^\d+\.\s+/ : /^-\s+/;
  while (index < lines.length && pattern.test(lines[index].trim())) {
    items.push(lines[index].trim().replace(pattern, ""));
    index += 1;
  }
  return {
    html: `<${tag}>${items.map((item) => `<li>${inline(item)}</li>`).join("")}</${tag}>`,
    next: index
  };
}

function renderMarkdown(markdown) {
  const lines = markdown.split(/\r?\n/);
  const html = [];
  const headings = [];
  let sectionOpen = false;
  let index = 0;

  while (index < lines.length) {
    const line = lines[index].trim();

    if (!line) {
      index += 1;
      continue;
    }

    if (line === "---") {
      html.push('<div class="divider"></div>');
      index += 1;
      continue;
    }

    if (line.startsWith("## ")) {
      html.push(`<h3>${inline(line.slice(3))}</h3>`);
      index += 1;
      continue;
    }

    if (line.startsWith("# ")) {
      if (sectionOpen) html.push("</section>");
      const title = line.slice(2).trim();
      const id = slugify(title, headings.length + 1);
      const auditClass = title.includes("완료 감사") ? " audit" : "";
      headings.push({ id, title });
      html.push(`<section class="section${auditClass}" id="${id}"><h2>${inline(title)}</h2>`);
      sectionOpen = true;
      index += 1;
      continue;
    }

    if (/^\|.*\|$/.test(line) && index + 1 < lines.length && /^\|[\s:\-|]+\|$/.test(lines[index + 1].trim())) {
      const table = parseTable(lines, index);
      html.push(table.html);
      index = table.next;
      continue;
    }

    if (/^-\s+/.test(line)) {
      const list = parseList(lines, index, false);
      html.push(list.html);
      index = list.next;
      continue;
    }

    if (/^\d+\.\s+/.test(line)) {
      const list = parseList(lines, index, true);
      html.push(list.html);
      index = list.next;
      continue;
    }

    html.push(`<p>${inline(line)}</p>`);
    index += 1;
  }

  if (sectionOpen) html.push("</section>");

  toc.innerHTML = '<div class="toc-title">Contents</div>' + headings
    .map((heading) => `<a href="#${heading.id}">${escapeHtml(heading.title)}</a>`)
    .join("");

  return html.join("");
}

target.innerHTML = renderMarkdown(decodeEntities(sourceEl.textContent.trim()));
</script>
